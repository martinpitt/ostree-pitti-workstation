include: fedora-common-ostree.yaml

ref: pitti-desktop
rojig:
  name: pitti-desktop
  summary: "Pitti Desktop"
  license: MIT

repos:
  - fedora-33
  - fedora-33-updates
  - fedora-33-updates-testing
  - rpmfusion-free
  - rpmfusion-free-updates

packages:
# hardware/drivers
  - kernel
  - kernel-modules-extra
  - iwl6000g2a-firmware
  - NetworkManager-wifi
  - NetworkManager-openvpn-gnome
  - sane-backends
  - sane-backends-drivers-scanners
  - powertop
  - iwd
  - udisks2-lvm2
  - opensc
# basic system
  - acl
  - attr
  - basesystem
  - cryptsetup
  - dnsmasq
  - fedora-workstation-backgrounds
  - filesystem
  - hostname
  - iproute
  - kbd
  - nss-altfiles
  - pciutils
  - sudo
  - usbutils
# shell tools and development
  - bc
  - gnupg2
  - fpaste
  - lsof
  - man-db
  - mtr
  - tree
  - bzip2
  - zip
  - unzip
  - vim-enhanced
  - ranger
  - bash-completion
  - fish
  - qemu-kvm
  - qemu-img
  - openvpn
  - mutt
  - nmap-ncat
  - offlineimap
  - weechat
  - duplicity
  - openssh-server
  - systemd-container
  - git
  - patchutils
  - make
  - strace
  - wget
  - w3m
  - cockpit-system
  - cockpit-ws
  - syncthing
  - krb5-workstation

# desktop plumbing/apps
  - dejavu-sans-fonts
  - dejavu-serif-fonts
  - dejavu-sans-mono-fonts
  - fontawesome-fonts
  - google-noto-emoji-color-fonts

  - gvfs-mtp
  - pulseaudio-utils
  - alsa-plugins-pulseaudio
  - gstreamer1-plugins-good
  - gstreamer1-plugins-ugly
  - gstreamer1-libav
  # for wf-recorder
  - libavdevice

  - pavucontrol
  - pcmanfm
  - simple-scan
  - nm-connection-editor
  - eog
  - evince
  - shotwell
  - rhythmbox
  - gnome-keyring
  - pinentry-gnome3
  - lxpolkit
  - gnome-disk-utility
  - gtimelog

# sway/wayland desktop
  - sway
  - swayidle
  - swaylock
  - kanshi
  - mako
  - waybar
  - slurp
  - grim
  - xorg-x11-server-Xwayland
  - firefox-wayland
  - wofi
  - brightnessctl
  - wl-clipboard

exclude-packages:
  - flatpak
  - flatpak-selinux
  - xdg-desktop-portal-wlr

add-files:
  - ["local-rpms/redhat-internal-cert-install-0.1-7.el7.csb.noarch.rpm", "/usr/lib/local-rpms/redhat-internal-cert-install.rpm"]
  - ["local-rpms/redhat-internal-NetworkManager-openvpn-profiles-0.1-29.el7.csb.noarch.rpm", "/usr/lib/local-rpms/redhat-internal-NetworkManager-openvpn-profiles.rpm"]

postprocess-script: pitti-post.sh
